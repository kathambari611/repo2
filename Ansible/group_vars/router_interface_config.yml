---
- name: Configure interface on Cisco Router
  hosts: Routers
  gather_facts: no

  tasks:
    - name: Configure FastEthernet0/1
      cisco.ios.ios_config:
        parents: interface FastEthernet0/1
        lines:
          - ip address 192.168.20.1 255.255.255.0
          - no shutdown

    - name: Save configuration
      cisco.ios.ios_config:
        save_when: modified